  <style>
    /* ---- palette lifted verbatim from vdz.me ---- */
    :root {
      --page:  #950908; /* dark red page background (shows behind photo) */
      --title: #EA8B3B; /* orange */
      --desc:  #44D3D1; /* teal  */
      --links: #B1CD3C; /* lime  */
    }

    /* fallback colour lives on html, BEHIND the image (shows only if it fails) */
    html { background-color: var(--page); }
    html, body { margin: 0; height: 100%; font-family: Tahoma, Geneva, sans-serif; }

    /* full-screen fixed cover photo, like the GoDaddy "scaleBackground" */
    #ss-background {
      position: fixed;
      inset: 0;
      z-index: -1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      background-color: var(--page);
    }

    /* title + tagline sit in a translucent maroon panel, upper-right (original layout) */
    #ss-about {
      position: absolute;
      top: 6%;
      right: 40px;
      max-width: 52%;
      text-align: left;
      background: rgba(149, 9, 8, 0.70);
      border-radius: 6px;
      padding: 12px 20px 14px;
      z-index: 2;
    }

    #ss-name {
      margin: 0 0 4px;
      font-family: "Limelight", "Century Gothic", Tahoma, sans-serif;
      font-weight: 400;
      font-size: 34px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--title);
      text-shadow: 2px 2px 3px rgba(0, 0, 0, 0.55);
    }

    #ss-description {
      font-size: 16px;
      color: var(--desc);
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.6);
    }

    /* link back to the original site */
    .orig {
      margin-top: 8px;
      font-size: 12px;
      font-style: italic;
    }
    .orig a {
      color: var(--links);
      text-decoration: none;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.6);
    }
    .orig a:hover { text-decoration: underline; }

    /* full-screen easter-egg click layer: above the photo, below the panel/buttons */
    #photo-egg { position: fixed; inset: 0; z-index: 0; }

    /* ---- top-right GoDaddy chrome ---- */
    #owner-login {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 2;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
      color: #333;
      background: linear-gradient(#f4f4f4, #d8d8d8);
      border: 1px solid #999;
      border-radius: 3px;
      padding: 4px 10px;
      text-decoration: none;
      text-transform: uppercase;
    }

    #share {
      position: absolute;
      top: 34px;
      right: 8px;
      display: flex;
      gap: 3px;
      z-index: 2;
    }
    #share a {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 13px;
      color: #fff;
      text-decoration: none;
      font-family: Georgia, "Times New Roman", serif;
    }
    .s-fb { background: #3b5998; }
    .s-tw { background: #111; }
    .s-ms { background: #000066; }
    .s-de { background: #3274c9; }
    .s-su { background: #eb4924; }

    /* GoDaddy cross-sell blurb, bottom-right */
    .cross-sell {
      position: fixed;
      right: 12px;
      bottom: 12px;
      font-size: 11px;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      padding: 6px 10px;
      border-radius: 3px;
      z-index: 2;
    }
    .cross-sell a { color: var(--links); text-decoration: none; }
    .cross-sell a:hover { text-decoration: underline; }
  </style>
